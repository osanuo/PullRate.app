# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title: Your Life as a TV Show
    description: Every day becomes an Episode — give it a title, describe what happened, rate your mood, add tags, and star the moments worth remembering.
    fontawesome_icon_name: film

  - title: Season Wrapped
    description: At the close of every Season, swipe through a stunning animated recap — your mood journey, highlight reel, and best moments brought together like a season finale.
    fontawesome_icon_name: star

  - title: Stats That Tell Your Story
    description: Mood heatmap, 30-day trends, streak history, word cloud of your most-written themes, and your personal best streaks.
    fontawesome_icon_name: chart-bar

  - title: Share Your Moments
    description: Export episodes as cinematic share cards — Ticket, Clean, Minimal and Retro Film styles. Share a full Season Recap anywhere.
    fontawesome_icon_name: share-alt

  - title: Your Data. Your Rules.
    description: Everything lives on your device with optional iCloud sync. No account required. No ads. No tracking. Just your story.
    fontawesome_icon_name: "lock"

  - title: Director's Cut
    description: Unlock All Past Seasons, Deep Stats, Season Themes, Premium Share Cards, Smart Reminders, Export, and Hidden Episodes.
    fontawesome_icon_name: crown



