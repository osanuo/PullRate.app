# Feature List
features                                  :
  - title: Track Every Card
    description: Add cards from your collection with name, set, grade, purchase price and quantity. Attach photos, tags and storage locations for every item.
    fontawesome_icon_name: layer-group
  - title: Live Portfolio Value
    description: See your total portfolio worth, unrealised gains, ROI and monthly change — updated every time you log a new market price.
    fontawesome_icon_name: chart-line
  - title: Sales History
    description: Record every sale with platform, price and date. PullRate instantly calculates your profit per card and cumulative earnings over time.
    fontawesome_icon_name: receipt
  - title: Price History Charts
    description: Track how the market value of each card changes over time with a built-in price history log and trend chart per item.
    fontawesome_icon_name: chart-bar
  - title: Your Data. Offline First.
    description: Everything is stored locally on your device with optional iCloud sync. No account required. No ads. No tracking.
    fontawesome_icon_name: lock
  - title: PullRate Premium
    description: Unlock unlimited cards, custom collections & folders, the full analytics dashboard and advanced profit & ROI breakdowns.
    fontawesome_icon_name: crown

